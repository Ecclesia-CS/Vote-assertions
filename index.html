<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Ecclesia — Délibération CentraleSupélec</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Calibri', system-ui, -apple-system, sans-serif; background: #F4EFE6; color: #1A1A1A; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; }

/* ── Header ── */
.header { display: flex; align-items: center; gap: 10px; padding: 16px 0 20px; border-bottom: 2px solid #184795; margin-bottom: 20px; }
.logo { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.logo img { width: 100%; height: 100%; object-fit: contain; }
.header-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: #184795; }
.header-sub { font-size: 12px; color: #888; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.pseudo-badge { font-size: 12px; background: #e8eef7; border: 1px solid #c5d3e8; border-radius: 20px; padding: 4px 10px; color: #184795; }

/* ── Boutons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #c5d3e8; background: white; color: #1A1A1A; transition: all 0.15s; width: 100%; font-family: 'Calibri', system-ui, sans-serif; }
.btn:hover { background: #e8eef7; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.45; cursor: default; transform: none; }
.btn-primary { background: #184795; color: white; border-color: #184795; }
.btn-primary:hover { background: #0f2f66; }
.btn-agree { background: #eaf3de; border-color: #c0dd97; color: #3b6d11; }
.btn-agree:hover { background: #d5eab8; }
.btn-disagree { background: #fcebeb; border-color: #f7c1c1; color: #791f1f; }
.btn-disagree:hover { background: #f5d0d0; }
.btn-pass { background: #F4EFE6; border-color: #c5d3e8; color: #666; }
.btn-pass:hover { background: #e8eef7; }
.btn-danger { background: #fcebeb; border-color: #f7c1c1; color: #791f1f; }
.btn-danger:hover { background: #f5d0d0; }
.btn-sm { padding: 6px 12px; font-size: 13px; width: auto; }
.btn-inline { width: auto; }
.btn-icon { padding: 6px 8px; width: auto; font-size: 16px; line-height: 1; }

/* ── Cartes & inputs ── */
.card { background: white; border: 1px solid #c5d3e8; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
.input { width: 100%; padding: 10px 14px; border: 1px solid #c5d3e8; border-radius: 8px; font-size: 15px; font-family: 'Calibri', system-ui, sans-serif; background: white; color: #1A1A1A; outline: none; }
.input:focus { border-color: #184795; }
.textarea { min-height: 80px; resize: vertical; }
.label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; }
.info-box { background: #e8eef7; border: 1px solid #c5d3e8; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #184795; margin-bottom: 16px; line-height: 1.5; }
.info-box strong { font-weight: 600; }
.success-box { background: #eaf3de; border: 1px solid #c0dd97; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #3b6d11; margin-bottom: 16px; line-height: 1.5; }

/* ── Progression ── */
.progress-bar { height: 4px; background: #c5d3e8; border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
.progress-fill { height: 100%; background: #184795; border-radius: 2px; transition: width 0.3s; }

/* ── Assertion (voter) ── */
.assertion-card { background: white; border: 1px solid #c5d3e8; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.assertion-text { font-family: 'Playfair Display', serif; font-size: 17px; line-height: 1.6; margin-bottom: 8px; }
.assertion-author { font-size: 12px; color: #aaa; margin-bottom: 20px; }
.vote-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ── Stats ── */
.stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stat-label { font-size: 12px; color: #555; width: 72px; flex-shrink: 0; }
.stat-bar-bg { flex: 1; height: 8px; background: #e8eef7; border-radius: 4px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.stat-pct { font-size: 13px; font-weight: 500; width: 36px; text-align: right; flex-shrink: 0; }

/* ── Badges ── */
.consensus-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.c-high { background: #e8eef7; color: #184795; }
.c-mid  { background: #faeeda; color: #633806; }
.c-low  { background: #fcebeb; color: #791f1f; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-admin    { background: #184795; color: white; }
.badge-open     { background: #e8eef7; color: #184795; }
.badge-closed   { background: #faeeda; color: #633806; }
.badge-archived { background: #F4EFE6; color: #888; }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; background: #e8eef7; border-radius: 8px; padding: 3px; margin-bottom: 20px; overflow-x: auto; }
.tab { flex: 1; padding: 7px 6px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer; color: #555; border: none; background: none; font-family: 'Calibri', system-ui, sans-serif; white-space: nowrap; min-width: 0; }
.tab.active { background: white; color: #184795; box-shadow: 0 1px 3px rgba(24,71,149,0.12); }

/* ── Séparateurs & états ── */
.separator { height: 1px; background: #c5d3e8; margin: 16px 0; }
.empty-state { text-align: center; padding: 32px 16px; color: #aaa; font-size: 14px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #184795; margin-bottom: 14px; }

/* ── Onboarding ── */
.onboarding { padding-top: 48px; padding-bottom: 32px; }
.onboarding-logo { width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.onboarding-logo img { width: 100%; height: 100%; object-fit: contain; }
.onboarding h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #184795; margin-bottom: 6px; }
.onboarding p { font-size: 15px; color: #888; margin-bottom: 28px; }

/* ── Sélection de session ── */
.session-pick { padding-top: 32px; }
.session-pick h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #184795; margin-bottom: 6px; }
.session-pick .sub { font-size: 14px; color: #888; margin-bottom: 24px; }
.session-card { background: white; border: 1px solid #c5d3e8; border-radius: 12px; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 14px; }
.session-card:hover { border-color: #184795; background: #f0f4fb; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(24,71,149,0.10); }
.session-card.closed-session { opacity: 0.55; cursor: not-allowed; }
.session-card.closed-session:hover { transform: none; box-shadow: none; border-color: #c5d3e8; background: white; }
.session-icon { width: 40px; height: 40px; background: #e8eef7; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.session-info { flex: 1; min-width: 0; }
.session-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.session-desc  { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-arrow { color: #184795; font-size: 16px; flex-shrink: 0; }

/* ── Admin : Sessions ── */
.session-admin-card { background: white; border: 1px solid #c5d3e8; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
.session-admin-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.session-admin-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; flex: 1; }
.session-admin-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.order-btns { display: flex; gap: 4px; }

/* ── Résultats ── */
.results-item { padding: 16px 0; border-bottom: 1px solid #e8eef7; }
.results-item:last-child { border-bottom: none; }
.results-text { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 10px; line-height: 1.5; }
.results-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

/* ── Checkbox ── */
.checkbox-card { cursor: pointer; border: 1px solid #c5d3e8; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; transition: all 0.15s; }
.checkbox-card.selected { border-color: #184795; background: #e8eef7; }
.checkbox-box { width: 16px; height: 16px; border: 1.5px solid #c5d3e8; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.checkbox-card.selected .checkbox-box { background: #184795; border-color: #184795; color: white; font-size: 10px; }
.checkbox-text { font-size: 14px; line-height: 1.5; }

/* ── Politique de modération ── */
.policy-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.policy-btn { border: 2px solid #c5d3e8; border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; background: white; font-family: 'Calibri', system-ui, sans-serif; transition: all 0.15s; }
.policy-btn:hover { border-color: #184795; background: #e8eef7; }
.policy-btn.active-open   { border-color: #639922; background: #eaf3de; }
.policy-btn.active-closed { border-color: #184795; background: #e8eef7; }
.policy-btn.active-ai     { border-color: #64A9DE; background: #eaf4fc; }
.policy-btn.disabled-btn  { opacity: 0.45; cursor: not-allowed; }
.policy-icon { font-size: 20px; margin-bottom: 4px; }
.policy-label { font-size: 12px; font-weight: 600; display: block; }
.policy-desc  { font-size: 10px; color: #888; display: block; margin-top: 2px; line-height: 1.3; }

/* ── Divers ── */
.modal-bg { position: fixed; inset: 0; background: rgba(24,71,149,0.35); display: flex; align-items: flex-end; z-index: 100; }
.modal { background: white; border-radius: 16px 16px 0 0; padding: 24px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #184795; }
.modal-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
.ai-result { background: #eaf4fc; border: 1px solid #64A9DE; border-radius: 8px; padding: 14px; font-size: 13px; color: #0f2f66; line-height: 1.6; margin-top: 12px; }
.ai-result-label { font-size: 11px; font-weight: 600; color: #184795; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #c5d3e8; border-top-color: #184795; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; color: #184795; font-size: 14px; }
.vote-done { text-align: center; padding: 48px 24px; }
.vote-done h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #184795; margin-bottom: 8px; }
.vote-done p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.6; }
.realtime-dot { width: 7px; height: 7px; background: #64A9DE; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.copy-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #184795; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; animation: fadeup 0.2s ease; }
@keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ── Session active banner ── */
.session-banner { background: #e8eef7; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; border-left: 3px solid #184795; }
.session-banner-title { font-weight: 600; flex: 1; color: #184795; }
.session-banner-change { font-size: 12px; color: #64A9DE; cursor: pointer; text-decoration: underline; }
.session-banner-change:hover { color: #184795; }
</style>

<body>
<div id="app">
  <div class="app">
    <div class="loading-screen">
      <span class="spinner"></span>
      Connexion à Supabase…
    </div>
  </div>
</div>

<script>
// ─── Client Supabase ──────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    flowType: "pkce",
  }
});

// ─── Lire ?session=ID dans l'URL ─────────────────────────
function getUrlSessionId() {
  const p = new URLSearchParams(window.location.search);
  const v = p.get("session");
  return v ? parseInt(v, 10) : null;
}

// ─── État global ──────────────────────────────────────────
let state = {
  pseudo:           localStorage.getItem("ecclesia_pseudo") || "",
  pseudoInput:      "",
  view:             "voter",
  adminTab:         "sessions",

  // Sessions
  sessions:         [],
  currentSessionId: null,
  sessionInput:     { title: "", description: "" },
  showNewSession:   false,

  // Assertions & votes
  assertions:       [],
  myVotes:          {},

  // Admin auth (Supabase Auth)
  adminMode:        false,
  adminUser:        null,       // session Supabase Auth
  adminEmailInput:  "",
  adminEmailSent:   false,
  adminAuthError:   "",
  modal:            null,

  // Proposer
  newA:             "",

  // Fusion IA
  mergeTargets:     [],
  aiResult:         null,
  aiLoading:        false,

  // Modération
  moderationPolicy: "closed",

  loading:          true,
};

// ─── Utilitaires ─────────────────────────────────────────
function calcConsensus(a) {
  const t = a.nb_accord + a.nb_desaccord + a.nb_passe;
  if (!t) return 0;
  const p = Math.abs(a.nb_accord/t - a.nb_desaccord/t);
  const part = (a.nb_accord + a.nb_desaccord) / t;
  return Math.round((1 - p) * part * 100);
}
function csLabel(s) {
  if (s >= 60) return { l: "Fort consensus", c: "c-high" };
  if (s >= 35) return { l: "Consensus moyen", c: "c-mid" };
  return { l: "Pas de consensus", c: "c-low" };
}
function sessionStatusLabel(s) {
  if (s === "open")   return { l: "Ouverte",  cls: "badge-open" };
  if (s === "closed") return { l: "Fermée",   cls: "badge-closed" };
  return                     { l: "Archivée", cls: "badge-archived" };
}
function buildSessionUrl(sessionId) {
  const base = window.location.origin + window.location.pathname;
  return `${base}?session=${sessionId}`;
}
function showToast(msg) {
  const t = document.createElement("div");
  t.className = "copy-toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ─── Auth admin (Supabase Auth + admin_roles) ─────────────
async function checkAdminRole(email) {
  if (!email) return false;
  const { data, error } = await db
    .from("admin_roles")
    .select("email")
    .eq("email", email)
    .single();
  return !error && !!data;
}

async function sendMagicLink() {
  const email = state.adminEmailInput.trim();
  if (!email) return;
  state.adminAuthError = "";
  render();

  // Vérifier d'abord que l'email est dans admin_roles
  const isAdmin = await checkAdminRole(email);
  if (!isAdmin) {
    state.adminAuthError = "Cet email n'est pas autorisé comme animateur.";
    render();
    return;
  }

  const { error } = await db.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: true,
      emailRedirectTo: "https://ecclesia-cs.github.io/Vote-assertions/",
    }
  });

  if (error) {
    state.adminAuthError = "Erreur : " + error.message;
  } else {
    state.adminEmailSent = true;
  }
  render();
}

async function doAdminLogout() {
  await db.auth.signOut();
  state.adminMode  = false;
  state.adminUser  = null;
  state.view       = "voter";
  state.adminEmailInput = "";
  state.adminEmailSent  = false;
  state.adminAuthError  = "";
  await loadAssertions();
  render();
}

// ─── Écouter les changements de session Auth ──────────────
function listenAuth() {
  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const isAdmin = await checkAdminRole(session.user.email);
      if (isAdmin) {
        state.adminUser  = session.user;
        state.adminMode  = true;
        state.modal      = null;
        state.adminEmailSent  = false;
        state.adminEmailInput = "";
        state.adminAuthError  = "";
        state.view       = "admin";
        state.adminTab   = "sessions";
        if (state.currentSessionId) await loadAllAssertions();
        else await loadSessions();
      } else {
        // Connecté mais pas admin → déconnecter silencieusement
        await db.auth.signOut();
        state.adminMode = false;
        state.adminUser = null;
      }
    } else {
      state.adminMode = false;
      state.adminUser = null;
    }
    render();
  });
}

// ─── Chargement sessions ──────────────────────────────────
async function loadSessions() {
  const { data, error } = await db
    .from("sessions")
    .select("*")
    .order("position", { ascending: true })
    .order("created_at", { ascending: true });
  if (!error && data) state.sessions = data;
}

// ─── Chargement assertions ────────────────────────────────
async function loadAssertions() {
  if (!state.currentSessionId) { state.assertions = []; return; }
  const { data, error } = await db
    .from("assertion_stats")
    .select("*")
    .eq("status", "approved")
    .eq("session_id", state.currentSessionId)
    .order("created_at", { ascending: true });
  if (!error && data) state.assertions = data;
}

async function loadAllAssertions() {
  if (!state.currentSessionId) { state.assertions = []; return; }
  const { data, error } = await db
    .from("assertion_stats")
    .select("*")
    .eq("session_id", state.currentSessionId)
    .order("created_at", { ascending: true });
  if (!error && data) state.assertions = data;
}

// ─── Chargement config ────────────────────────────────────
async function loadConfig() {
  const { data } = await db.from("config").select("value").eq("key", "moderation_policy").single();
  if (data) state.moderationPolicy = data.value;
}

async function setPolicy(policy) {
  await db.from("config").update({ value: policy }).eq("key", "moderation_policy");
  state.moderationPolicy = policy;
  render();
}

// ─── Votes ────────────────────────────────────────────────
async function loadMyVotes() {
  if (!state.pseudo || !state.currentSessionId) return;
  const { data } = await db
    .from("votes")
    .select("assertion_id, vote")
    .eq("pseudo", state.pseudo)
    .eq("session_id", state.currentSessionId);
  if (data) {
    state.myVotes = {};
    data.forEach(v => { state.myVotes[v.assertion_id] = v.vote; });
  }
}

// ─── Temps réel ──────────────────────────────────────────
function subscribeRealtime() {
  db.channel("ecclesia-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "assertions" }, async () => {
      if (state.adminMode) await loadAllAssertions();
      else await loadAssertions();
      render();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "votes" }, async () => {
      if (state.adminMode) await loadAllAssertions();
      else await loadAssertions();
      render();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "config" }, async () => {
      await loadConfig();
      render();
    })
    .on("postgres_changes", { event: "*", schema: "public", table: "sessions" }, async () => {
      await loadSessions();
      render();
    })
    .subscribe();
}

// ─── Actions Sessions ─────────────────────────────────────
async function createSession() {
  const title = state.sessionInput.title.trim();
  if (!title) return;
  const maxPos = state.sessions.reduce((m, s) => Math.max(m, s.position || 0), 0);
  const { error } = await db.from("sessions").insert({
    title,
    description: state.sessionInput.description.trim() || null,
    status: "open",
    position: maxPos + 1,
  });
  if (error) { alert("Erreur : " + error.message); return; }
  state.sessionInput = { title: "", description: "" };
  state.showNewSession = false;
  await loadSessions();
  render();
}

async function updateSessionStatus(id, status) {
  await db.from("sessions").update({ status }).eq("id", id);
  await loadSessions();
  render();
}

async function moveSession(id, direction) {
  const sorted = [...state.sessions].sort((a, b) => a.position - b.position);
  const idx = sorted.findIndex(s => s.id === id);
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const a = sorted[idx];
  const b = sorted[swapIdx];
  await db.from("sessions").update({ position: b.position }).eq("id", a.id);
  await db.from("sessions").update({ position: a.position }).eq("id", b.id);
  await loadSessions();
  render();
}

function copySessionLink(sessionId) {
  const url = buildSessionUrl(sessionId);
  navigator.clipboard.writeText(url).then(() => showToast("Lien copié !")).catch(() => {
    prompt("Copie ce lien :", url);
  });
}

// ─── Actions Votes/Assertions ─────────────────────────────
async function handleVote(assertionId, vote) {
  state.myVotes[assertionId] = vote;
  const { error } = await db.from("votes").insert({
    assertion_id: assertionId,
    pseudo: state.pseudo,
    vote,
    session_id: state.currentSessionId,
  });
  if (error) {
    console.warn("Vote:", error.message);
    delete state.myVotes[assertionId];
  }
  await loadAssertions();
  render();
}

async function handleSubmit() {
  const text = state.newA.trim();
  if (!text || !state.currentSessionId) return;
  const status = state.moderationPolicy === "open" ? "approved" : "pending";
  const { error } = await db.from("assertions").insert({
    text,
    author: state.pseudo,
    status,
    session_id: state.currentSessionId,
  });
  if (!error) {
    state.newA = "";
    const msg = state.moderationPolicy === "open"
      ? "Assertion publiée directement — politique ouverte active."
      : "Assertion soumise — elle sera visible après validation par l'animateur.";
    alert(msg);
  } else {
    alert("Erreur : " + error.message);
  }
  render();
}

async function handleModerate(id, newStatus) {
  const { error } = await db.from("assertions").update({ status: newStatus }).eq("id", id);
  if (error) { alert("Erreur : " + error.message); return; }
  await loadAllAssertions();
  render();
}

async function handleAiMerge() {
  const sel = state.assertions.filter(a => state.mergeTargets.includes(a.id));
  if (sel.length < 2) return;
  state.aiLoading = true; state.aiResult = null; render();
  try {
    const prompt = `Tu es un assistant pour un club de débat. Voici ${sel.length} assertions similaires à fusionner en une seule, claire et neutre :\n\n${sel.map((a, i) => `${i+1}. "${a.text}"`).join("\n")}\n\nPropose une seule assertion fusionnée, concise (1-2 phrases max), qui capture l'essence commune. Réponds uniquement avec l'assertion, sans guillemets ni explication.`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    const data = await res.json();
    state.aiResult = (data.content?.find(b => b.type === "text")?.text || "Erreur.").trim();
  } catch { state.aiResult = "Erreur de connexion à l'API Anthropic."; }
  state.aiLoading = false; render();
}

async function handleApplyMerge() {
  const ids = state.mergeTargets;
  const { error: e1 } = await db.from("assertions").insert({
    text: state.aiResult,
    author: "Fusion IA",
    status: "approved",
    session_id: state.currentSessionId,
  }).select().single();
  if (e1) { alert("Erreur: " + e1.message); return; }
  for (const id of ids) {
    await db.from("assertions").update({ status: "rejected" }).eq("id", id);
  }
  state.mergeTargets = []; state.aiResult = null;
  await loadAllAssertions(); render();
}

// ─── Connexion pseudo ─────────────────────────────────────
function doLogin() {
  const p = (state.pseudoInput || "").trim();
  if (!p) return;
  localStorage.setItem("ecclesia_pseudo", p);
  state.pseudo = p;
  render();
}

// ─── Sélection session ────────────────────────────────────
async function selectSession(sessionId) {
  state.currentSessionId = sessionId;
  localStorage.setItem("ecclesia_session", sessionId);
  await Promise.all([
    state.adminMode ? loadAllAssertions() : loadAssertions(),
    loadMyVotes()
  ]);
  state.view = "voter";
  render();
}

function changeSession() {
  state.currentSessionId = null;
  localStorage.removeItem("ecclesia_session");
  state.assertions = [];
  state.myVotes = {};
  state.view = "voter";
  render();
}

// ═══════════════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════════════
function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  const app = document.createElement("div");
  app.className = "app";

  if (state.loading) {
    app.innerHTML = `<div class="loading-screen"><span class="spinner"></span> Connexion à Supabase…</div>`;
    root.appendChild(app); return;
  }

  // Onboarding pseudo
  if (!state.pseudo) { app.appendChild(renderOnboard()); root.appendChild(app); return; }

  // Sélection de session (sauf si admin)
  if (!state.currentSessionId && !state.adminMode) {
    app.appendChild(renderHeader());
    app.appendChild(renderSessionPick());
    root.appendChild(app); return;
  }

  app.appendChild(renderHeader());

  // Modal admin login
  if (state.modal === "admin-login") {
    app.appendChild(renderAdminModal());
    root.appendChild(app); return;
  }

  app.appendChild(renderTabs());

  // Banner session active (pour les votants)
  if (state.currentSessionId && !state.adminMode) {
    const sess = state.sessions.find(s => s.id === state.currentSessionId);
    if (sess) app.appendChild(renderSessionBanner(sess));
  }

  if (state.view === "voter")   app.appendChild(renderVoter());
  if (state.view === "results") app.appendChild(renderResults());
  if (state.view === "submit")  app.appendChild(renderSubmit());
  if (state.view === "admin") {
    if (state.adminTab === "sessions")  app.appendChild(renderAdminSessions());
    if (state.adminTab === "stats")     app.appendChild(renderAdminStats());
    if (state.adminTab === "moderate")  app.appendChild(renderAdminMod());
    if (state.adminTab === "policy")    app.appendChild(renderAdminPolicy());
    if (state.adminTab === "merge")     app.appendChild(renderAdminMerge());
  }

  root.appendChild(app);
}

// ── Tabs ─────────────────────────────────────────────────
function renderTabs() {
  const pending = state.assertions.filter(a => a.status === "pending").length;
  const tabs = state.view === "admin"
    ? [
        { l: "← Retour", fn: () => { state.view = "voter"; loadAssertions().then(render); } },

        { l: "Stats",     fn: () => { state.adminTab = "stats";     render(); }, active: state.adminTab === "stats" },
        { l: `Modérer${pending > 0 ? " ("+pending+")" : ""}`, fn: () => { state.adminTab = "moderate"; render(); }, active: state.adminTab === "moderate" },
        { l: "Politique", fn: () => { state.adminTab = "policy";    render(); }, active: state.adminTab === "policy" },
        { l: "Fusion IA", fn: () => { state.adminTab = "merge";     render(); }, active: state.adminTab === "merge" },
        { l: "🔓 Déco",   fn: () => doAdminLogout() },
      ]
    : [
        { l: "Voter",     fn: () => { state.view = "voter";   render(); }, active: state.view === "voter" },
        { l: "Résultats", fn: () => { state.view = "results"; render(); }, active: state.view === "results" },
        { l: "Proposer",  fn: () => { state.view = "submit";  render(); }, active: state.view === "submit" },

  const wrap = el("div", "tabs");
  tabs.forEach(t => {
    const btn = el("button", "tab" + (t.active ? " active" : ""), t.l);

// ── Vue Voter ────────────────────────────────────────────
function renderVoter() {
  if (!state.currentSessionId) {
    const wrap = el("div", "empty-state");
    wrap.innerHTML = `<div style="font-size:32px;margin-bottom:12px">🗣</div><div>Sélectionnez ou créez une session dans l'onglet <strong>Sessions</strong>.</div>`;
    return wrap;
  }
  const approved = state.assertions.filter(a => a.status === "approved");
  const unvoted  = approved.filter(a => !state.myVotes[a.id]);
  const cur = unvoted[0] || null;
  if (!cur) {
    const wrap = el("div", "vote-done");
    wrap.innerHTML = `<div style="font-size:52px;margin-bottom:16px">✓</div><h2>Tout voté !</h2><p>Vous avez voté sur toutes les assertions disponibles.</p>`;
    const btn = el("button", "btn btn-primary", "Voir les résultats →");
    btn.onclick = () => { state.view = "results"; render(); };
    wrap.appendChild(btn);
    return wrap;
  }
  const done = approved.length - unvoted.length;
  const pct = Math.round(done / approved.length * 100);
  const wrap = el("div");
  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:8px">
      <span>${unvoted.length} restante${unvoted.length > 1 ? "s" : ""}</span>
      <span>${done}/${approved.length}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="assertion-card">
      <div class="assertion-text">${cur.text}</div>
      <div class="vote-buttons">
        <button class="btn btn-agree" id="v-accord">✓ Accord</button>
        <button class="btn btn-disagree" id="v-desaccord">✗ Désaccord</button>
        <button class="btn btn-pass" id="v-passe">— Passer</button>
      </div>
    </div>
  `;
  wrap.querySelector("#v-accord").onclick    = () => handleVote(cur.id, "accord");
  wrap.querySelector("#v-desaccord").onclick = () => handleVote(cur.id, "desaccord");
  wrap.querySelector("#v-passe").onclick     = () => handleVote(cur.id, "passe");
  return wrap;
}

// ── Vue Résultats ────────────────────────────────────────
function renderResults() {
  const sorted = [...state.assertions.filter(a => a.status === "approved")]
    .sort((a, b) => calcConsensus(b) - calcConsensus(a));
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", "Résultats · classement par consensus"));
  if (!sorted.length) { wrap.appendChild(el("div", "empty-state", "Aucun résultat pour l'instant.")); return wrap; }
  sorted.forEach((a, i) => {
    const t = a.nb_accord + a.nb_desaccord + a.nb_passe;
    const pct = v => t ? Math.round(v / t * 100) : 0;
    const cs = calcConsensus(a);
    const { l, c } = csLabel(cs);
    const item = el("div", "results-item");
    item.innerHTML = `
      <div class="results-meta">
        <span style="font-size:13px;color:#aaa;font-weight:600">#${i+1}</span>
        <span class="consensus-badge ${c}">${l} · ${cs}%</span>
      </div>
      <div class="results-text">${a.text}</div>
      ${statRow("Accord",    pct(a.nb_accord),    "#639922", "#3b6d11")}
      ${statRow("Désaccord", pct(a.nb_desaccord), "#e24b4a", "#791f1f")}
      ${statRow("Passé",     pct(a.nb_passe),     "#b4b2a9", "#5f5e5a")}
      <div style="font-size:11px;color:#bbb;margin-top:4px">${t} vote${t!==1?"s":""}</div>
    `;
    wrap.appendChild(item);
  });
  return wrap;
}

// ── Admin : Sessions ──────────────────────────────────────
function renderAdminSessions() {
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", "Gestion des sessions"));

  const createBtn = el("button", "btn btn-primary", null, { style: "margin-bottom:16px" });
  createBtn.innerHTML = state.showNewSession ? "✕ Annuler" : "+ Nouvelle session";
  createBtn.onclick = () => { state.showNewSession = !state.showNewSession; render(); };
  wrap.appendChild(createBtn);

  if (state.showNewSession) {
    const form = el("div", "card", null, { style: "margin-bottom:16px" });
    form.appendChild(el("div", "section-title", "Nouvelle session"));
    const titleInp = el("input", "input");
    titleInp.placeholder = "Titre du débat (ex. Débat sur l'héritage)";
    titleInp.value = state.sessionInput.title;
    titleInp.oninput = e => state.sessionInput.title = e.target.value;
    titleInp.onkeydown = e => { if (e.key === "Enter") createSession(); };
    const descInp = el("textarea", "input textarea", null, { style: "min-height:60px;margin-top:8px" });
    descInp.placeholder = "Description courte (optionnel)";
    descInp.value = state.sessionInput.description;
    descInp.oninput = e => state.sessionInput.description = e.target.value;
    const okBtn = el("button", "btn btn-primary", "Créer →", { style: "margin-top:10px" });
    okBtn.onclick = createSession;
    form.appendChild(el("label", "label", "Titre"));
    form.appendChild(titleInp);
    const descLabel = el("label", "label", "Description (optionnel)");
    descLabel.style.marginTop = "10px";
    form.appendChild(descLabel);
    form.appendChild(descInp);
    form.appendChild(okBtn);
    wrap.appendChild(form);
  }

  if (!state.sessions.length) {
    wrap.appendChild(el("div", "empty-state", "Aucune session. Créez-en une pour commencer."));
    return wrap;
  }

  const sorted = [...state.sessions].sort((a, b) => a.position - b.position);
  sorted.forEach((s, idx) => {
    const { l: statusL, cls: statusCls } = sessionStatusLabel(s.status);
    const card = el("div", "session-admin-card");
    const header = el("div", "session-admin-header");
    header.appendChild(el("span", "session-admin-title", s.title));
    header.appendChild(el("span", `badge ${statusCls}`, statusL));
    card.appendChild(header);
    if (s.description) card.appendChild(el("div", "", s.description, { style: "font-size:13px;color:#888;margin-bottom:6px" }));

    const actions = el("div", "session-admin-actions");
    const orderWrap = el("div", "order-btns");
    const upBtn = el("button", "btn btn-sm btn-icon btn-inline", "↑");
    upBtn.disabled = idx === 0; upBtn.title = "Monter";
    upBtn.onclick = () => moveSession(s.id, -1);
    const downBtn = el("button", "btn btn-sm btn-icon btn-inline", "↓");
    downBtn.disabled = idx === sorted.length - 1; downBtn.title = "Descendre";
    downBtn.onclick = () => moveSession(s.id, 1);
    orderWrap.appendChild(upBtn); orderWrap.appendChild(downBtn);
    actions.appendChild(orderWrap);

    const linkBtn = el("button", "btn btn-sm btn-inline", "🔗 Lien");
    linkBtn.onclick = () => copySessionLink(s.id);
    actions.appendChild(linkBtn);

    if (s.status !== "archived") {
      const goBtn = el("button", "btn btn-sm btn-inline", "▶ Ouvrir");
      goBtn.onclick = async () => { await selectSession(s.id); state.view = "voter"; render(); };
      actions.appendChild(goBtn);
    }

    if (s.status === "open") {
      const closeBtn = el("button", "btn btn-sm btn-inline", "🔒 Fermer");
      closeBtn.onclick = () => updateSessionStatus(s.id, "closed");
      actions.appendChild(closeBtn);
    } else if (s.status === "closed") {
      const openBtn = el("button", "btn btn-sm btn-inline btn-agree", "🟢 Rouvrir");
      openBtn.onclick = () => updateSessionStatus(s.id, "open");
      actions.appendChild(openBtn);
    }

    if (s.status !== "archived") {
      const archBtn = el("button", "btn btn-sm btn-inline btn-danger", "Archiver");
      archBtn.onclick = () => {
        if (confirm(`Archiver "${s.title}" ?`)) updateSessionStatus(s.id, "archived");
      };
      actions.appendChild(archBtn);
    }

    card.appendChild(actions);
    wrap.appendChild(card);
  });
  return wrap;
}

// ── Admin : Stats ────────────────────────────────────────
function renderAdminStats() {
  if (!state.currentSessionId) return el("div", "empty-state", "Sélectionnez une session via l'onglet Sessions.");
  const approved = state.assertions.filter(a => a.status === "approved");
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", "Statistiques des assertions validées"));
  if (!approved.length) { wrap.appendChild(el("div", "empty-state", "Aucune assertion validée.")); return wrap; }
  approved.forEach(a => {
    const t = a.nb_accord + a.nb_desaccord + a.nb_passe;
    const pct = v => t ? Math.round(v / t * 100) : 0;
    const cs = calcConsensus(a);
    const { l, c } = csLabel(cs);
    const card = el("div", "card");
    card.innerHTML = `
      <div style="font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.5">${a.text}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:14px">par ${a.author} · ${t} vote${t!==1?"s":""}</div>
      ${statRow("Accord",    pct(a.nb_accord),    "#639922", "#3b6d11")}
      ${statRow("Désaccord", pct(a.nb_desaccord), "#e24b4a", "#791f1f")}
      ${statRow("Passé",     pct(a.nb_passe),     "#b4b2a9", "#5f5e5a")}
      <div style="margin-top:10px"><span class="consensus-badge ${c}">Consensus : ${cs}% — ${l}</span></div>
    `;
    wrap.appendChild(card);
  });
  return wrap;
}

// ── Admin : Modération ───────────────────────────────────
function renderAdminMod() {
  if (!state.currentSessionId) return el("div", "empty-state", "Sélectionnez une session via l'onglet Sessions.");
  const pending  = state.assertions.filter(a => a.status === "pending");
  const rejected = state.assertions.filter(a => a.status === "rejected");
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", `Soumissions en attente (${pending.length})`));
  if (!pending.length) wrap.appendChild(el("div", "empty-state", "Aucune soumission à modérer."));
  pending.forEach(a => {
    const card = el("div", "card");
    card.innerHTML = `
      <div style="font-size:14px;margin-bottom:4px;line-height:1.5">${a.text}</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:14px">Soumis par ${a.author}</div>
    `;
    const btns = el("div", "", null, { style: "display:flex;gap:8px" });
    const ok = el("button", "btn btn-agree btn-sm btn-inline", "✓ Valider");
    ok.onclick = () => handleModerate(a.id, "approved");
    const no = el("button", "btn btn-danger btn-sm btn-inline", "✗ Rejeter");
    no.onclick = () => handleModerate(a.id, "rejected");
    btns.appendChild(ok); btns.appendChild(no); card.appendChild(btns);
    wrap.appendChild(card);
  });
  if (rejected.length) {
    wrap.appendChild(el("div", "separator"));
    wrap.appendChild(el("div", "section-title", `Rejetées (${rejected.length})`));
    rejected.forEach(a => {
      const card = el("div", "card", null, { style: "opacity:0.6" });
      card.innerHTML = `<div style="font-size:13px;margin-bottom:4px;line-height:1.5">${a.text}</div><div style="font-size:12px;color:#aaa;margin-bottom:12px">par ${a.author}</div>`;
      const btn = el("button", "btn btn-sm btn-inline", "↩ Remettre en attente");
      btn.onclick = () => handleModerate(a.id, "pending");
      card.appendChild(btn); wrap.appendChild(card);
    });
  }
  return wrap;
}

// ── Admin : Politique ────────────────────────────────────
function renderAdminPolicy() {
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", "Politique de modération des soumissions"));
  const policies = [
    { key: "open",   icon: "🟢", label: "Ouverte",  desc: "Toutes les propositions sont publiées immédiatement", activeClass: "active-open",   disabled: false },
    { key: "closed", icon: "🔒", label: "Fermée",   desc: "Chaque proposition doit être validée par l'animateur", activeClass: "active-closed", disabled: false },
    { key: "ai",     icon: "🤖", label: "IA",       desc: "Vérification automatique par LLM (à venir)",           activeClass: "active-ai",     disabled: true  },
  ];
  const grid = el("div", "policy-grid");
  policies.forEach(p => {
    const isActive = state.moderationPolicy === p.key;
    const cls = ["policy-btn", isActive ? p.activeClass : "", p.disabled ? "disabled-btn" : ""].filter(Boolean).join(" ");
    const btn = el("div", cls);
    btn.innerHTML = `<div class="policy-icon">${p.icon}</div><span class="policy-label">${p.label}</span><span class="policy-desc">${p.desc}</span>`;
    if (!p.disabled) btn.onclick = () => setPolicy(p.key);
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  const descriptions = {
    open:   "Les participants peuvent soumettre des assertions qui apparaissent immédiatement dans le vote, sans validation préalable.",
    closed: "Toute nouvelle assertion passe en file d'attente. L'animateur doit valider chaque soumission avant qu'elle soit visible.",
    ai:     "Fonctionnalité à venir — un LLM vérifiera automatiquement que l'assertion respecte les critères avant publication.",
  };
  const desc = el("div", "card", null, { style: "margin-top:4px" });
  desc.innerHTML = `<div style="font-size:13px;color:#555;line-height:1.6">${descriptions[state.moderationPolicy] || ""}</div>`;
  wrap.appendChild(desc);
  return wrap;
}

// ── Admin : Fusion IA ─────────────────────────────────────
function renderAdminMerge() {
  if (!state.currentSessionId) return el("div", "empty-state", "Sélectionnez une session via l'onglet Sessions.");
  const approved = state.assertions.filter(a => a.status === "approved");
  const wrap = el("div");
  wrap.appendChild(el("div", "section-title", "Fusion d'assertions avec l'IA"));
  wrap.appendChild(el("div", "info-box", "Sélectionnez 2 assertions ou plus, puis demandez à l'IA de proposer une assertion commune."));
  approved.forEach(a => {
    const isSel = state.mergeTargets.includes(a.id);
    const card = el("div", "checkbox-card" + (isSel ? " selected" : ""));
    card.innerHTML = `<div class="checkbox-box">${isSel ? "✓" : ""}</div><div class="checkbox-text">${a.text}</div>`;
    card.onclick = () => {
      state.mergeTargets = isSel ? state.mergeTargets.filter(x => x !== a.id) : [...state.mergeTargets, a.id];
      render();
    };
    wrap.appendChild(card);
  });
  const n = state.mergeTargets.length;
  const mergeBtn = el("button", "btn btn-primary", null, { style: "margin-top:8px;margin-bottom:12px" });
  mergeBtn.disabled = n < 2 || state.aiLoading;
  mergeBtn.innerHTML = state.aiLoading ? '<span class="spinner"></span> Analyse en cours…' : `Fusionner ${n} assertion${n!==1?"s":""} →`;
  mergeBtn.onclick = handleAiMerge;
  wrap.appendChild(mergeBtn);
  if (state.aiResult) {
    const panel = el("div", "ai-result");
    panel.innerHTML = `<div class="ai-result-label">Proposition de l'IA</div><div>${state.aiResult}</div>`;
    wrap.appendChild(panel);
    const btns = el("div", "", null, { style: "display:flex;gap:8px;margin-top:10px" });
    const ok = el("button", "btn btn-agree btn-inline", "✓ Appliquer"); ok.onclick = handleApplyMerge;
    const cancel = el("button", "btn btn-sm btn-inline", "Annuler");
    cancel.onclick = () => { state.aiResult = null; state.mergeTargets = []; render(); };
    btns.appendChild(ok); btns.appendChild(cancel); wrap.appendChild(btns);
  }
  return wrap;
}

// ── Helpers HTML ─────────────────────────────────────────
function el(tag, cls, content, attrs) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (content) e.textContent = content;
  if (attrs) for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function statRow(lbl, pct, fill, color) {
  return `<div class="stat-row">
    <span class="stat-label" style="color:${color}">${lbl}</span>
    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${fill}"></div></div>
    <span class="stat-pct">${pct}%</span>
  </div>`;
}

// ─── Démarrage ────────────────────────────────────────────
async function init() {
  render(); // loader

  // Écouter les changements d'auth en premier
  listenAuth();

  await Promise.all([loadSessions(), loadConfig()]);

  // Détecter session dans l'URL
  const urlSessionId = getUrlSessionId();
  if (urlSessionId) {
    const exists = state.sessions.find(s => s.id === urlSessionId && s.status !== "archived");
    if (exists) {
      state.currentSessionId = urlSessionId;
      localStorage.setItem("ecclesia_session", urlSessionId);
    }
  } else {
    const saved = parseInt(localStorage.getItem("ecclesia_session") || "0", 10);
    if (saved) {
      const exists = state.sessions.find(s => s.id === saved && s.status !== "archived");
      if (exists) state.currentSessionId = saved;
    }
  }

  // Charger données si session connue
  if (state.currentSessionId) {
    await Promise.all([loadAssertions(), loadMyVotes()]);
  }

  state.loading = false;
  subscribeRealtime();
  render();
}

window.onload = () => init();
</script>
